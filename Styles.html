<style>
  :root {
    --bg: #f2ecdf;
    --bg-deep: #e4d7bf;
    --surface: rgba(255, 252, 246, 0.9);
    --surface-strong: rgba(248, 241, 228, 0.92);
    --surface-dark: #18140f;
    --text: #251d13;
    --muted: #6d614f;
    --line: rgba(74, 55, 29, 0.14);
    --accent: #0f5a2c;
    --accent-strong: #0a3f1d;
    --accent-soft: rgba(15, 90, 44, 0.1);
    --success: #2e8b57;
    --pending: #b8b2a9;
    --available: #ffffff;
    --danger: #9d2f2f;
    --warning: #c49436;
    --shadow: 0 20px 45px rgba(48, 34, 14, 0.1);
    --shadow-soft: 0 12px 25px rgba(48, 34, 14, 0.08);
    --radius-xl: 28px;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-pill: 999px;
  }

  * {
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    background:
      radial-gradient(circle at top left, rgba(15, 90, 44, 0.12), transparent 28%),
      radial-gradient(circle at top right, rgba(202, 158, 67, 0.16), transparent 26%),
      linear-gradient(180deg, #f8f3e8 0%, #efe7d7 48%, #e8dcc7 100%);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.28;
    background-image:
      linear-gradient(rgba(74, 55, 29, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74, 55, 29, 0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.28), transparent 75%);
  }

  .shell {
    max-width: 1320px;
    margin: 0 auto;
    padding: 26px;
  }

  .brand-bar {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    align-items: center;
    margin-bottom: 18px;
  }

  .brand-lockup {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    border: 1px solid var(--line);
    border-radius: var(--radius-pill);
    background: rgba(255, 251, 243, 0.84);
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(8px);
  }

  .brand-mark {
    width: 114px;
    max-width: 32vw;
    height: auto;
    display: block;
  }

  .brand-copy small,
  .eyebrow,
  .hero-kicker,
  .mini-label {
    display: block;
    margin: 0;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 11px;
    font-weight: 700;
  }

  .brand-copy strong {
    display: block;
    font-size: 1rem;
    line-height: 1.1;
  }

  .pillset {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.85fr);
    gap: 20px;
    margin-bottom: 22px;
  }

  .hero-main,
  .hero-side,
  .card,
  .day-card,
  .list-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
  }

  .hero-main,
  .hero-side,
  .card {
    padding: 24px;
  }

  .hero-main {
    position: relative;
    overflow: hidden;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    background:
      linear-gradient(135deg, rgba(24, 20, 15, 0.94), rgba(15, 90, 44, 0.92)),
      linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0));
    color: #fff8eb;
  }

  .hero-main::before {
    content: '';
    position: absolute;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    top: -110px;
    right: -80px;
    background: radial-gradient(circle, rgba(201, 171, 88, 0.45), transparent 70%);
  }

  .hero-main::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.06) 32%, transparent 60%),
      linear-gradient(0deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0));
    pointer-events: none;
  }

  .hero-content,
  .hero-side > * {
    position: relative;
    z-index: 1;
  }

  h1,
  h2,
  h3,
  p {
    margin-top: 0;
  }

  h1 {
    font-size: clamp(2.1rem, 4vw, 3.65rem);
    margin-bottom: 14px;
    line-height: 0.96;
    max-width: 11ch;
  }

  h2 {
    font-size: 1.28rem;
    margin-bottom: 16px;
  }

  .hero-copy {
    max-width: 52ch;
    color: rgba(255, 248, 235, 0.82);
    font-size: 1.04rem;
  }

  .hero-metrics {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-top: 18px;
  }

  .hero-metric {
    padding: 14px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .hero-metric strong {
    display: block;
    font-size: 1.25rem;
    margin-bottom: 4px;
  }

  .hero-side {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 16px;
    background:
      radial-gradient(circle at top right, rgba(15, 90, 44, 0.16), transparent 44%),
      linear-gradient(180deg, rgba(255, 252, 246, 0.92), rgba(246, 238, 223, 0.92));
  }

  .hero-side .lead,
  .muted {
    color: var(--muted);
  }

  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    padding: 8px 10px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid var(--line);
  }

  .chip {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1px solid var(--line);
    display: inline-block;
  }

  .chip-approved {
    background: rgba(46, 139, 87, 0.52);
  }

  .chip-pending {
    background: #c9c5be;
  }

  .chip-available {
    background: #ffffff;
  }

  .grid {
    display: grid;
    gap: 20px;
    margin-bottom: 20px;
  }

  .grid.two {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .card {
    padding: 24px;
  }

  .list-card {
    padding: 16px;
    margin-bottom: 12px;
    border-radius: var(--radius-lg);
    background: rgba(255, 251, 243, 0.88);
  }

  .stack {
    display: grid;
    gap: 12px;
  }

  .inline,
  .section-header {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .section-header {
    justify-content: space-between;
  }

  label {
    display: grid;
    gap: 6px;
    font-weight: 600;
  }

  input,
  textarea,
  button {
    font: inherit;
  }

  input,
  textarea {
    width: 100%;
    padding: 13px 14px;
    border-radius: 15px;
    border: 1px solid rgba(74, 55, 29, 0.18);
    background: rgba(255, 255, 255, 0.82);
    transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
  }

  input:focus,
  textarea:focus {
    outline: none;
    border-color: rgba(15, 90, 44, 0.45);
    box-shadow: 0 0 0 4px rgba(15, 90, 44, 0.08);
    transform: translateY(-1px);
  }

  textarea {
    resize: vertical;
  }

  .button {
    border: 1px solid rgba(15, 90, 44, 0.2);
    background: rgba(255, 255, 255, 0.65);
    color: var(--accent-strong);
    border-radius: var(--radius-pill);
    padding: 11px 17px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 8px 18px rgba(48, 34, 14, 0.05);
  }

  .button:hover {
    transform: translateY(-1px);
    background: rgba(255, 255, 255, 0.88);
  }

  .button.primary {
    background: linear-gradient(135deg, var(--accent), #14743a);
    color: #fff9f0;
    border-color: rgba(15, 90, 44, 0.6);
  }

  .button.subtle {
    border-color: var(--line);
    color: var(--muted);
  }

  .message {
    padding: 15px 18px;
    border-radius: 18px;
    margin-bottom: 18px;
    border: 1px solid transparent;
    box-shadow: var(--shadow-soft);
  }

  .message.success {
    background: rgba(46, 139, 87, 0.12);
    border-color: rgba(46, 139, 87, 0.28);
  }

  .message.error {
    background: rgba(157, 47, 47, 0.1);
    border-color: rgba(157, 47, 47, 0.25);
  }

  .hidden {
    display: none;
  }

  .summary,
  .request-box,
  .note,
  .mini-panel {
    background: var(--surface-strong);
    border-radius: 18px;
    padding: 15px 16px;
    border: 1px solid rgba(74, 55, 29, 0.1);
  }

  .summary p:last-child,
  .note:last-child {
    margin-bottom: 0;
  }

  .status,
  .pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 7px 10px;
    border-radius: var(--radius-pill);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .status-pendiente {
    background: rgba(181, 176, 168, 0.4);
  }

  .status-aprobado {
    background: rgba(46, 139, 87, 0.18);
  }

  .status-rechazado {
    background: rgba(157, 47, 47, 0.16);
  }

  .pill {
    background: rgba(15, 90, 44, 0.08);
    color: var(--accent-strong);
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 16px;
  }

  .day-card {
    padding: 18px;
    border-radius: var(--radius-lg);
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.85), rgba(249, 242, 230, 0.9));
  }

  .day-head {
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px dashed rgba(74, 55, 29, 0.16);
  }

  .day-head h3 {
    margin-bottom: 4px;
  }

  .slots {
    display: grid;
    gap: 10px;
  }

  .slot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    width: 100%;
    border-radius: 15px;
    border: 1px solid rgba(74, 55, 29, 0.12);
    padding: 11px 12px;
    text-align: left;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  }

  .slot:not(:disabled):hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(48, 34, 14, 0.06);
    border-color: rgba(15, 90, 44, 0.24);
  }

  .slot:disabled {
    cursor: not-allowed;
  }

  .slot-available {
    background: var(--available);
  }

  .slot-pending {
    background: #d8d5cf;
    color: #514c45;
  }

  .slot-approved {
    background: rgba(46, 139, 87, 0.18);
    color: #1d5a39;
    border-color: rgba(46, 139, 87, 0.35);
  }

  .slot.selected {
    outline: 2px solid rgba(15, 90, 44, 0.7);
    box-shadow: 0 0 0 5px rgba(15, 90, 44, 0.08);
  }

  .admin-slot {
    flex-direction: column;
    align-items: flex-start;
  }

  .admin-slot small {
    color: var(--muted);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th,
  td {
    border-bottom: 1px solid rgba(74, 55, 29, 0.12);
    text-align: left;
    padding: 11px 8px;
  }

  th {
    font-size: 0.92rem;
    color: var(--muted);
  }

  code {
    padding: 2px 6px;
    border-radius: 8px;
    background: rgba(15, 90, 44, 0.08);
  }

  .checkline {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .checkline input {
    width: auto;
  }

  .footer-note {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 18px;
    border: 1px solid var(--line);
    background: rgba(255, 251, 243, 0.72);
    color: var(--muted);
  }

  @media (max-width: 980px) {
    .hero {
      grid-template-columns: 1fr;
    }

    .hero-metrics {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 860px) {
    .shell {
      padding: 18px;
    }

    .brand-bar {
      flex-direction: column;
      align-items: flex-start;
    }

    .grid.two {
      grid-template-columns: 1fr;
    }

    .hero-metrics {
      grid-template-columns: 1fr;
    }

    .calendar {
      grid-template-columns: 1fr;
    }
  }
</style>
